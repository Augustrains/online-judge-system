<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJ论坛 - 帖子列表</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f7fa; color: #1d2129; }
        /* 导航栏 */
        .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.08); height: 56px; display: flex; align-items: center; padding: 0 20px; }
        .navbar .nav-inner { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 1200px; margin: 0 auto; }
        .navbar .brand { font-size: 20px; font-weight: 700; color: #165DFF; }
        .navbar .brand i { margin-right: 6px; }
        .navbar .nav-links { display: flex; gap: 16px; align-items: center; }
        .navbar .nav-links a { color: #6b7280; text-decoration: none; font-size: 14px; }
        .navbar .nav-links a:hover { color: #165DFF; }
        .navbar .welcome { font-size: 14px; color: #6b7280; }
        /* 主内容 */
        .main-content { max-width: 1200px; margin: 0 auto; padding: 88px 20px 40px 20px; }
        .page-header { text-align: center; margin-bottom: 24px; }
        .page-header h1 { font-size: 28px; margin-bottom: 8px; }
        .page-header p { color: #6b7280; }
        /* 搜索 */
        .search-wrap { max-width: 600px; margin: 0 auto 24px; position: relative; }
        .search-wrap input { width: 100%; padding: 12px 40px 12px 16px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 15px; outline: none; transition: border 0.2s; }
        .search-wrap input:focus { border-color: #165DFF; }
        .search-wrap .search-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #9ca3af; }
        .search-info { text-align: center; font-size: 14px; color: #6b7280; margin-bottom: 12px; display: none; }
        /* 帖子卡片 */
        .posts-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
        @media (min-width: 768px) { .posts-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .posts-grid { grid-template-columns: repeat(3, 1fr); } }
        .post-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: all 0.3s; cursor: pointer; position: relative; }
        .post-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .post-card h3 { font-size: 18px; margin-bottom: 10px; }
        .post-card h3 a { color: #165DFF; text-decoration: none; }
        .post-card h3 a:hover { text-decoration: underline; }
        .post-card .meta { font-size: 14px; color: #6b7280; margin-bottom: 10px; }
        .post-card .meta i { margin-right: 4px; }
        .post-card .views { display: inline-block; background: #e8f0fe; color: #165DFF; padding: 2px 10px; border-radius: 12px; font-size: 12px; margin-left: 8px; }
        .post-card .detail-link { color: #165DFF; text-decoration: none; font-size: 14px; }
        .post-card .detail-link:hover { text-decoration: underline; }
        .post-card .del-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #ff4d4f; font-size: 20px; cursor: pointer; display: none; }
        .post-card:hover .del-btn { display: block; }
        /* 状态提示 */
        .status-box { text-align: center; padding: 32px 0; }
        .status-box .icon { font-size: 48px; color: #d1d5db; margin-bottom: 12px; }
        .status-box .msg { color: #6b7280; }
        .spinner { width: 32px; height: 32px; border: 4px solid #e5e7eb; border-top-color: #165DFF; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-box { background: #fff0f0; border-left: 4px solid #ff4d4f; color: #b91c1c; padding: 12px 16px; border-radius: 4px; margin: 12px 0; }
        /* 按钮 */
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; }
        .btn-primary { background: #165DFF; color: #fff; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-danger { background: #ff4d4f; color: #fff; }
        .btn-outline { background: #fff; color: #374151; border: 1px solid #d1d5db; }
        /* 模态框 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: #fff; border-radius: 12px; padding: 24px; max-width: 440px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal-box h2 { font-size: 20px; margin-bottom: 8px; }
        .modal-box .close-btn { float: right; background: none; border: none; font-size: 24px; cursor: pointer; color: #6b7280; line-height: 1; }
        .modal-box label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
        .modal-box input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 15px; margin-bottom: 16px; }
        .modal-box .form-error { background: #fff0f0; border-left: 4px solid #ff4d4f; color: #b91c1c; padding: 10px 12px; border-radius: 4px; font-size: 14px; margin-top: 8px; display: none; }
        .del-modal-actions { display: flex; gap: 12px; margin-top: 16px; }
        .del-modal-actions button { flex: 1; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 15px; }
        /* Toast */
        .toast { position: fixed; top: 20px; right: 20px; z-index: 9999; padding: 12px 20px; border-radius: 8px; color: #fff; font-size: 14px; display: none; }
        /* Footer */
        .footer { text-align: center; padding: 20px; color: #9ca3af; font-size: 14px; border-top: 1px solid #e5e7eb; background: #fff; margin-top: 40px; }
        /* 隐藏 */
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-inner">
            <div class="brand"><i class="fa fa-comments"></i>OJ论坛</div>
            <div class="nav-links">
                <a href="#">首页</a>
                <span class="welcome" id="username-display">未登录</span>
                <button class="btn btn-primary" id="create-post-btn"><i class="fa fa-plus"></i>发布帖子</button>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="main-content">
        <div class="page-header">
            <h1><i class="fa fa-list-alt"></i> 帖子列表</h1>
            <p>浏览和参与讨论，分享您的想法和见解</p>
        </div>

        <div class="search-wrap">
            <input type="text" id="search-input" placeholder="搜索帖子...">
            <i class="fa fa-search search-icon"></i>
        </div>
        <div class="search-info" id="search-info">
            <span id="results-count">0</span> 个结果匹配 "<span id="search-query-text"></span>"
        </div>

        <!-- 加载中 -->
        <div class="status-box" id="loading-box">
            <div class="spinner"></div>
            <p class="msg">加载中...</p>
        </div>

        <!-- 错误 -->
        <div class="error-box hidden" id="error-box">
            <strong>加载失败</strong>
            <p id="error-text">无法获取帖子数据</p>
        </div>

        <!-- 空列表 -->
        <div class="status-box hidden" id="empty-box">
            <div class="icon"><i class="fa fa-folder-open-o"></i></div>
            <p class="msg">暂无帖子，成为第一个发布的人吧！</p>
        </div>

        <!-- 无搜索结果 -->
        <div class="status-box hidden" id="no-results-box">
            <div class="icon"><i class="fa fa-search"></i></div>
            <p class="msg">没有找到匹配的帖子</p>
        </div>

        <!-- 帖子列表 -->
        <div class="posts-grid" id="posts-grid"></div>
    </div>

    <!-- 页脚 -->
    <div class="footer">OJ论坛 &copy; 2026</div>

    <!-- 创建帖子模态框 -->
    <div class="modal-overlay" id="create-modal">
        <div class="modal-box">
            <button class="close-btn" id="close-modal-btn">&times;</button>
            <h2>创建新帖子</h2>
            <form id="create-form" style="margin-top:12px;">
                <label for="post-title">帖子名称</label>
                <input type="text" id="post-title" placeholder="请输入帖子标题" required>
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">发布帖子</button>
            </form>
            <div class="form-error" id="form-error-box"><span id="form-error-text"></span></div>
        </div>
    </div>

    <!-- 删除确认模态框 -->
    <div class="modal-overlay" id="delete-modal">
        <div class="modal-box" style="text-align:center;">
            <div style="font-size:48px;color:#ff4d4f;margin-bottom:12px;"><i class="fa fa-trash"></i></div>
            <h2>确认删除</h2>
            <p style="color:#6b7280;margin:8px 0;">您确定要删除这个帖子吗？此操作不可撤销。</p>
            <p style="font-weight:500;" id="delete-post-title"></p>
            <div class="del-modal-actions">
                <button class="btn btn-outline" id="cancel-delete-btn">取消</button>
                <button class="btn btn-danger" id="confirm-delete-btn">确认删除</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        var username = new URLSearchParams(window.location.search).get('name');
        var isAdmin = false;
        var allPosts = [];
        var currentDeleteType = '';

        // DOM refs
        var $ = function(id) { return document.getElementById(id); };
        var usernameDisplay = $('username-display');
        var postsGrid = $('posts-grid');
        var loadingBox = $('loading-box');
        var errorBox = $('error-box');
        var errorText = $('error-text');
        var emptyBox = $('empty-box');
        var noResultsBox = $('no-results-box');
        var searchInfo = $('search-info');
        var resultsCount = $('results-count');
        var searchQueryText = $('search-query-text');
        var searchInput = $('search-input');
        var createModal = $('create-modal');
        var createForm = $('create-form');
        var postTitleInput = $('post-title');
        var formErrorBox = $('form-error-box');
        var formErrorText = $('form-error-text');
        var deleteModal = $('delete-modal');
        var deletePostTitle = $('delete-post-title');
        var toast = $('toast');

        // Init
        if (username) {
            usernameDisplay.textContent = '欢迎，' + username;
        } else {
            usernameDisplay.textContent = '未登录';
        }

        // Toast
        function showToast(msg, isError) {
            toast.textContent = msg;
            toast.style.background = isError ? '#ef4444' : '#10b981';
            toast.style.display = 'block';
            toast.style.animation = 'none';
            toast.offsetHeight;
            toast.style.animation = '';
            setTimeout(function() { toast.style.display = 'none'; }, 2500);
        }

        // Show/hide
        function show(el) { if (el) el.classList.remove('hidden'); }
        function hide(el) { if (el) el.classList.add('hidden'); }

        // Format date
        function fmtDate(s) {
            try { var d = new Date(s); if (isNaN(d.getTime())) return s; return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日'; }
            catch(e) { return s; }
        }

        // Check admin
        function checkAdmin() {
            if (!username) return Promise.resolve(false);
            return fetch('/checkadmin?name=' + encodeURIComponent(username))
                .then(function(r) { return r.json(); })
                .then(function(d) { return d.isAdmin === true; })
                .catch(function() { return false; });
        }

        // Fetch posts
        function fetchPosts() {
            show(loadingBox);
            hide(errorBox);
            hide(emptyBox);
            hide(noResultsBox);
            hide(searchInfo);
            postsGrid.innerHTML = '';

            return checkAdmin().then(function(admin) {
                isAdmin = admin;
                console.log('isAdmin:', isAdmin);
                return fetch('/findtype');
            }).then(function(r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            }).then(function(data) {
                allPosts = data;
                hide(loadingBox);
                if (!allPosts || allPosts.length === 0) {
                    show(emptyBox);
                } else {
                    renderPosts(allPosts);
                }
            }).catch(function(e) {
                console.error('fetchPosts:', e);
                hide(loadingBox);
                errorText.textContent = '无法获取帖子数据: ' + (e.message || '网络错误');
                show(errorBox);
            });
        }

        // Render posts
        function renderPosts(posts) {
            postsGrid.innerHTML = '';
            hide(noResultsBox);
            hide(emptyBox);

            if (!posts || posts.length === 0) {
                if (searchInput.value.trim()) show(noResultsBox);
                else show(emptyBox);
                return;
            }

            posts.forEach(function(p) {
                var card = document.createElement('div');
                card.className = 'post-card';
                card.setAttribute('data-type', p.type || '');

                var delBtn = '';
                if (isAdmin) {
                    delBtn = '<button class="del-btn" data-type="' + escHtml(p.type) + '" title="删除">&times;</button>';
                }

                card.innerHTML = delBtn +
                    '<h3><a href="javascript:void(0)" class="post-link" data-type="' + escHtml(p.type) + '">' + escHtml(p.type) + '</a></h3>' +
                    '<div class="meta">' +
                    '<i class="fa fa-user-circle"></i> ' + escHtml(p.name || '匿名') +
                    ' &bull; <i class="fa fa-calendar"></i> ' + fmtDate(p.time) +
                    '<span class="views"><i class="fa fa-eye"></i> ' + (p.number || 0) + '</span>' +
                    '</div>' +
                    '<a href="javascript:void(0)" class="post-link detail-link" data-type="' + escHtml(p.type) + '">查看详情 <i class="fa fa-arrow-right"></i></a>';

                postsGrid.appendChild(card);

                // Click to view post
                var links = card.querySelectorAll('.post-link');
                links.forEach(function(link) {
                    link.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var t = link.getAttribute('data-type');
                        updateViewCount(t);
                        window.location.href = 'page.html?type=' + encodeURIComponent(t) +
                            '&name=' + encodeURIComponent(p.name || '') +
                            '&time=' + encodeURIComponent(p.time || '') +
                            '&current=' + encodeURIComponent(username || '');
                    });
                });

                // Delete button
                var db = card.querySelector('.del-btn');
                if (db) {
                    db.addEventListener('click', function(e) {
                        e.stopPropagation();
                        openDeleteModal(db.getAttribute('data-type'));
                    });
                }
            });
        }

        function escHtml(s) {
            if (!s) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function updateViewCount(t) {
            fetch('/updateview', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({type: t})
            }).catch(function(){});
        }

        // Create post
        function createPost(title) {
            if (!username) {
                formErrorText.textContent = '请先登录才能发布帖子';
                show(formErrorBox);
                return;
            }
            fetch('/inserttype', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({type: title, name: username, time: new Date().toISOString(), number: 0})
            }).then(function(r) { return r.json().then(function(d) { return {ok: r.ok, data: d}; }); })
            .then(function(result) {
                if (!result.ok) throw new Error(result.data.reason || '创建失败');
                closeCreateModal();
                fetchPosts();
                showToast('帖子创建成功');
            }).catch(function(e) {
                formErrorText.textContent = e.message || '创建帖子失败';
                show(formErrorBox);
            });
        }

        // Delete post
        function deletePost(type) {
            if (!isAdmin) return;
            fetch('/deletetalk', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({type: type, name: username})
            }).then(function(r) { return r.json().then(function(d) { return {ok: r.ok, data: d}; }); })
            .then(function(result) {
                if (!result.ok) throw new Error(result.data.reason || '删除失败');
                closeDeleteModal();
                fetchPosts();
                showToast('帖子删除成功');
            }).catch(function(e) {
                showToast(e.message || '删除失败', true);
            });
        }

        // Search
        function doSearch(query) {
            query = query.toLowerCase().trim();
            if (!query) {
                hide(searchInfo);
                hide(noResultsBox);
                if (allPosts.length > 0) renderPosts(allPosts);
                return;
            }
            var matched = allPosts.filter(function(p) { return (p.type||'').toLowerCase().indexOf(query) !== -1; });
            resultsCount.textContent = matched.length;
            searchQueryText.textContent = query;
            show(searchInfo);
            if (matched.length === 0) {
                hide(emptyBox);
                show(noResultsBox);
                postsGrid.innerHTML = '';
            } else {
                hide(noResultsBox);
                hide(emptyBox);
            }
            renderPosts(matched);
        }

        // Modal
        function openCreateModal() {
            if (!username) { showToast('请先登录才能发布帖子', true); return; }
            createModal.style.display = 'flex';
        }
        function closeCreateModal() {
            createModal.style.display = 'none';
            hide(formErrorBox);
            postTitleInput.value = '';
        }
        function openDeleteModal(type) {
            currentDeleteType = type;
            deletePostTitle.textContent = type;
            deleteModal.style.display = 'flex';
        }
        function closeDeleteModal() {
            deleteModal.style.display = 'none';
            currentDeleteType = '';
        }

        // Event bindings
        $('create-post-btn').addEventListener('click', openCreateModal);
        $('close-modal-btn').addEventListener('click', closeCreateModal);
        createModal.addEventListener('click', function(e) { if (e.target === createModal) closeCreateModal(); });
        deleteModal.addEventListener('click', function(e) { if (e.target === deleteModal) closeDeleteModal(); });
        createForm.addEventListener('submit', function(e) {
            e.preventDefault();
            var t = postTitleInput.value.trim();
            if (!t) { formErrorText.textContent = '帖子名称不能为空'; show(formErrorBox); return; }
            createPost(t);
        });
        $('cancel-delete-btn').addEventListener('click', closeDeleteModal);
        $('confirm-delete-btn').addEventListener('click', function() {
            if (currentDeleteType) deletePost(currentDeleteType);
        });

        var searchTimer;
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(function() { doSearch(searchInput.value); }, 300);
        });

        // Start
        document.addEventListener('DOMContentLoaded', function() {
            fetchPosts();
            searchInput.focus();
        });
    </script>
</body>
</html>
